<!DOCTYPE html>
<html>
<head>
    <title>View Tasks</title>
    <style>
        body{

    font-family: Arial, sans-serif;

    background-color:#f4f6f9;

    margin:40px;

}

h1{

    color:#2c6fd6;

}

a{

    text-decoration:none;

    color:#2c6fd6;

    font-weight:bold;

}

a:hover{

    color:#174a9c;

}

form{

    background:white;

    padding:20px;

    border-radius:10px;

    width:400px;

}

input, textarea{

    width:100%;

    padding:8px;

    margin-top:5px;

    margin-bottom:15px;

}

button{

    background:#2c6fd6;

    color:white;

    border:none;

    padding:10px 20px;

    border-radius:5px;

    cursor:pointer;

}

button:hover{

    background:#174a9c;

}

</style>

</head>

<body>

    <hr>

<a href="/">Home</a> |
<a href="/add-task/">Add Task</a> |
<a href="/view-tasks/">View Tasks</a> |
<a href="/about/">About</a>

<hr>

<h1>All Tasks</h1>

<p>Total Tasks: {{ tasks|length }}</p>

{% for task in tasks %}
<div style="
background:white;
padding:15px;
margin:10px 0;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
">

    <h3>{{ task.task_name }}</h3>

    <p><strong>Priority:</strong> {{ task.priority }}</p>

    <p><strong>Status:</strong> {{ task.status }}</p>

    <p><strong>Description:</strong> {{ task.description }}</p>

</div>
{% endfor %}

<a href="/">Back Home</a>

</body>
</html>
